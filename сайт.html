<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>BookNook</title>
    <link rel="stylesheet" href="style.css">
    <link rel="shortcut icon" href="img/image 39.png" type="image/x-icon">
</head>
<body>

    <header class="header">
        <div class="container header-inner">
            <div class="logo">
                <img src="img/Group 13.png" alt="BookNook" height="50px">
            </div>
            <nav class="nav">
                <a href="#" class="active" data-page="catalog">Каталог</a>
                <a href="#" data-page="cart">Корзина <span class="badge" id="badge">0</span></a>
                <a href="#" data-page="about">Мои книги</a>
                <button class="btn-login" id="loginBtn">Войти</button>
            </nav>
        </div>
    </header>

    <main class="container">
        <!-- КАТАЛОГ -->
        <section id="page-catalog" class="page active">
            <h1>Библиотека</h1>
            <div class="books" id="catalog"></div>
        </section>

        <!-- КОРЗИНА -->
        <section id="page-cart" class="page">
            <h1>Корзина</h1>
            <div class="cart-items" id="cartList">
                <div class="empty">Корзина пуста</div>
            </div>
            <button class="btn-checkout" id="checkoutBtn">Оформить заказ</button>
        </section>

        <!-- МОИ КНИГИ -->
        <section id="page-about" class="page">
            <h1>Мои книги</h1>
            <div class="cart-items" id="myBooksList">
                <div class="empty">У вас пока нет купленных книг</div>
            </div>
        </section>
    </main>

    <!-- МОДАЛКА ВХОДА -->
    <div class="modal" id="loginModal">
        <div class="modal-box">
            <span class="close" id="loginClose">&times;</span>
            <p>Регистрация</p>
            <form id="loginForm">
                <label>Имя</label>
                <input type="text" placeholder="Имя" required>

                <label>Фамилия</label>
                <input type="text" placeholder="Фамилия" required>

                <label>Почта</label>
                <input type="email" placeholder="@gmail" required>

                <label>Телефон</label>
                <input type="tel" placeholder="+7 ..." required>

                <div class="modal-btns">
                    <button type="button" class="btn-back" id="loginBack">Назад</button>
                    <button type="submit" class="btn-forward">Вперед</button>
                </div>
            </form>
        </div>
    </div>

    <!-- МОДАЛКА ОФОРМЛЕНИЯ -->
    <div class="modal" id="checkoutModal">
        <div class="modal-box">
            <span class="close" id="checkoutClose">&times;</span>
            <p>Оформление</p>
            <form id="checkoutForm">
                <label>Карта</label>
                <input type="text" placeholder="Номер карты" required>

                <label>Почта</label>
                <input type="email" placeholder="@gmail" required>

                <label>Телефон</label>
                <input type="tel" placeholder="+7 ..." required>

                <div class="total">Общая сумма: <span id="total">0</span> руб.</div>

                <div class="modal-btns">
                    <button type="button" class="btn-back" id="checkoutBack">Назад</button>
                    <button type="submit" class="btn-forward">Вперед</button>
                </div>
            </form>
        </div>
    </div>

    <!-- УВЕДОМЛЕНИЕ -->
    <div class="toast" id="toast">Заказ оформлен!</div>

    <script src="script.js"></script>

</body>
</html>
